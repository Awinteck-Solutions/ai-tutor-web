<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var themes = ['light', 'dark', 'edu'];
        var pref = localStorage.getItem('adesia-theme-preference');
        var legacy = localStorage.getItem('adesia-theme');
        if (!themes.includes(pref) && pref !== 'auto') pref = themes.includes(legacy) ? legacy : 'auto';
        var hour = new Date().getHours();
        var autoTheme = hour >= 6 && hour < 18 ? 'light' : 'dark';
        var theme = pref === 'auto' || !themes.includes(pref) ? autoTheme : pref;
        document.documentElement.classList.add(theme);
      })();
    </script>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" sizes="any" />
    <link rel="shortcut icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/adesia-icon.svg" />
    <link rel="mask-icon" href="/adesia-icon.svg" color="hsl(48, 96%, 53%)" />
    <meta name="theme-color" content="hsl(48, 96%, 53%)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Adesia — AI tutor that turns your uploads into structured lessons, flashcards, quizzes, and grounded chat." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>Adesia — AI tutor from your materials</title>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
